name: growingkids
description: 'A new Flutter project.'
publish_to: 'none'
version: 0.1.6+7

environment:
    sdk: ^3.10.7

dependencies:
    cupertino_icons: ^1.0.8
    camera: ^0.12.0+1
    flutter_bloc: ^9.1.1
    go_router: ^17.1.0
    google_fonts: ^8.0.2
    image_picker: ^1.1.2
    lucide_icons_flutter: ^3.1.10
    mobile_scanner: ^7.1.3
    qr_flutter: ^4.1.0
    share_plus: ^10.1.4
    shared_preferences: ^2.5.4
    supabase_flutter: ^2.12.0
    url_launcher: ^6.3.2
    flutter:
        sdk: flutter

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^6.0.0
    flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
    android: true
    ios: true
    image_path: 'assets/icons/app_icon.png'

flutter:
    uses-material-design: true
    assets:
        - config.json
        - assets/images/
